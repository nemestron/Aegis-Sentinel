name: Hourly Finance Update

on:
  schedule:
    # 30th minute of UTC hours 3 through 13.
    # This precisely maps to 09:00 AM through 07:00 PM Indian Standard Time (IST), Mon-Fri.
    - cron: '30 3-13 * * 1-5'
  workflow_dispatch:

jobs:
  run-aegis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Autonomous Scheduler
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scheduled_runner.py